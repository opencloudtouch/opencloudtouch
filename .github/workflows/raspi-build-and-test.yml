# ==============================================================================
# REUSABLE: Build + Test Raspberry Pi SD Card Images
#
# Shared logic for pi-gen build, image compression, and QEMU smoke tests.
# Called by build-raspi.yml (production) and test-build.yml (dev/test).
#
# Fixes applied:
#   - xz -6 (good compression + acceptable speed, single-thread for Etcher)
#   - bookworm release (stable pi-gen target)
#   - Image validation (partition table, integrity, size)
#   - Removed EXPORT_NOOBS (unused)
#   - Pi-gen stage caching with permission fix (sudo chown after build)
# ==============================================================================

name: 'Raspi Build & Test (reusable)'

on:
  workflow_call:
    inputs:
      arch:
        description: 'Target architecture (arm64 or armhf)'
        required: true
        type: string
      output_name:
        description: 'Output filename for the .img.xz (without extension added automatically)'
        required: true
        type: string
      docker_image_tag:
        description: 'Docker image tag to embed in compose file (default: latest)'
        required: false
        default: 'latest'
        type: string
      test_version:
        description: 'Expected version string for smoke tests'
        required: false
        default: 'latest'
        type: string

env:
  PI_GEN_REPO: https://github.com/RPi-Distro/pi-gen.git
  # Bump this manually when pi-gen has breaking changes that invalidate caches
  PIGEN_CACHE_VERSION: v1

jobs:
  # ============================================================================
  # VALIDATE INPUTS
  # ============================================================================
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate arch
        run: |
          ARCH="${{ inputs.arch }}"
          if [[ ! "$ARCH" =~ ^(arm64|armhf)$ ]]; then
            echo "::error::Invalid architecture: $ARCH (must be arm64 or armhf)"
            exit 1
          fi
      - name: Validate output_name
        run: |
          NAME="${{ inputs.output_name }}"
          if [[ ! "$NAME" =~ ^[a-zA-Z0-9._+-]+\.img\.xz$ ]]; then
            echo "::error::Invalid output_name: $NAME (must be alphanumeric with .img.xz extension)"
            exit 1
          fi
      - name: Validate docker_image_tag
        run: |
          TAG="${{ inputs.docker_image_tag }}"
          if [[ ! "$TAG" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::Invalid docker_image_tag: $TAG"
            exit 1
          fi

  # ============================================================================
  # BUILD IMAGE
  # ============================================================================
  build:
    name: Build ${{ inputs.arch }}
    runs-on: ubuntu-latest
    needs: [validate]
    timeout-minutes: 90

    outputs:
      output_name: ${{ steps.compress.outputs.output_name }}
      raw_size_mb: ${{ steps.compress.outputs.raw_size_mb }}
      xz_size_mb: ${{ steps.compress.outputs.xz_size_mb }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Free disk space
        run: |
          echo "=== Disk before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift \
            /usr/local/graalvm /usr/local/.ghcup \
            /usr/local/share/powershell /usr/local/share/chromium \
            /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get clean
          echo "=== Disk after cleanup ==="
          df -h /

      - name: Manage cache budget
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # If cache budget exceeds 8 GB, purge ALL caches to start fresh.
          # One slower build is acceptable — future builds benefit from clean caches.
          USAGE=$(gh api repos/${{ github.repository }}/actions/cache/usage --jq '.active_caches_size_in_bytes')
          USAGE_MB=$((USAGE / 1048576))
          THRESHOLD_MB=$((8 * 1024))  # 8 GB

          echo "Cache usage: ${USAGE_MB} MB / 10240 MB (threshold: ${THRESHOLD_MB} MB)"

          if [ "$USAGE_MB" -gt "$THRESHOLD_MB" ]; then
            echo "::warning::Cache budget ${USAGE_MB} MB exceeds ${THRESHOLD_MB} MB — purging all caches"
            DELETED=0
            gh cache list --limit 200 --json id --jq '.[].id' | while read -r cid; do
              gh cache delete "$cid" 2>/dev/null && DELETED=$((DELETED + 1)) || true
            done
            echo "::notice::Purged caches. This build will populate fresh caches for future runs."
          else
            echo "::notice::Cache budget OK (${USAGE_MB} MB / ${THRESHOLD_MB} MB threshold)"
          fi

      - name: Clone pi-gen
        run: |
          # Use the release-specific pi-gen branches.
          # These have correct GPG keys, sources lists, and package lists
          # pre-configured — no patching needed.
          if [ "${{ inputs.arch }}" = "armhf" ]; then
            PI_GEN_BRANCH=bookworm
          else
            PI_GEN_BRANCH=bookworm-arm64
          fi
          echo "::notice::Cloning pi-gen branch: $PI_GEN_BRANCH"
          git clone --depth 1 --branch "$PI_GEN_BRANCH" \
            ${{ env.PI_GEN_REPO }} pi-gen

          echo "PI_GEN_BRANCH=$PI_GEN_BRANCH" >> "$GITHUB_ENV"

      - name: Restore pi-gen stage cache
        id: cache-stages
        uses: actions/cache@v4
        with:
          path: pi-gen/work
          key: pigen-${{ inputs.arch }}-${{ env.PI_GEN_BRANCH }}-${{ env.PIGEN_CACHE_VERSION }}

      - name: Configure pi-gen
        run: |
          cd pi-gen
          cat > config << 'PICONFIG'
          IMG_NAME=opencloudtouch-${{ inputs.arch }}
          RELEASE=bookworm
          TARGET_HOSTNAME=opencloudtouch
          FIRST_USER_NAME=oct
          FIRST_USER_PASS=opencloudtouch
          DISABLE_FIRST_BOOT_USER_RENAME=1
          ENABLE_SSH=1
          LOCALE_DEFAULT=en_GB.UTF-8
          KEYBOARD_KEYMAP=us
          KEYBOARD_LAYOUT="English (US)"
          TIMEZONE_DEFAULT=Europe/Berlin
          WPA_COUNTRY=DE
          STAGE_LIST="stage0 stage1 stage2 stage-opencloudtouch"
          PICONFIG

          if [ "${{ inputs.arch }}" = "arm64" ]; then
            echo "ARCH=arm64" >> config
          else
            echo "ARCH=armhf" >> config
          fi

          echo "::group::pi-gen config"
          cat config
          echo "::endgroup::"

      - name: Install OpenCloudTouch stage
        run: |
          # Copy custom stage into pi-gen
          cp -r deployment/raspi-image/stage-opencloudtouch pi-gen/stage-opencloudtouch
          find pi-gen/stage-opencloudtouch -name "*.sh" -exec chmod +x {} \;

          # Copy embedded files
          mkdir -p pi-gen/stage-opencloudtouch/01-configure-oct/files
          cp deployment/raspi-image/files/* pi-gen/stage-opencloudtouch/01-configure-oct/files/

          # Remove pi-gen's user-rename wizard — it installs userconf-pi which
          # enables userconfig.service (the whiptail 'new username' dialog).
          # Our image has user 'oct' pre-configured, so this step must not run.
          rm -f pi-gen/export-image/01-user-rename/00-packages
          rm -f pi-gen/export-image/01-user-rename/01-run.sh

          # Set Docker image tag in compose file
          DOCKER_TAG="${{ inputs.docker_image_tag }}"
          if [ "$DOCKER_TAG" != "latest" ]; then
            sed -i "s|ghcr.io/opencloudtouch/opencloudtouch:latest|ghcr.io/opencloudtouch/opencloudtouch:${DOCKER_TAG}|g" \
              pi-gen/stage-opencloudtouch/01-configure-oct/files/docker-compose.yml
            echo "::notice::Docker image tag set to: $DOCKER_TAG"
          fi

          # Export image from our stage (NOT NOOBS — only .img)
          touch pi-gen/stage-opencloudtouch/EXPORT_IMAGE

          # Skip image export for base stages
          touch pi-gen/stage0/SKIP_IMAGES
          touch pi-gen/stage1/SKIP_IMAGES
          touch pi-gen/stage2/SKIP_IMAGES

          # Skip desktop stages entirely
          touch pi-gen/stage3/SKIP 2>/dev/null || true
          touch pi-gen/stage4/SKIP 2>/dev/null || true
          touch pi-gen/stage5/SKIP 2>/dev/null || true

          # Skip base stages if cached AND rootfs is complete
          if [ "${{ steps.cache-stages.outputs.cache-hit }}" = "true" ]; then
            IMG_NAME="opencloudtouch-${{ inputs.arch }}"
            STAGE2_ROOTFS="pi-gen/work/${IMG_NAME}/stage2/rootfs"
            if [ -d "$STAGE2_ROOTFS" ] && [ -f "$STAGE2_ROOTFS/etc/os-release" ]; then
              echo "::notice::Cache valid — skipping stages 0-2"
              touch pi-gen/stage0/SKIP
              touch pi-gen/stage1/SKIP
              touch pi-gen/stage2/SKIP
            else
              echo "::warning::Cache incomplete (no stage2 rootfs) — full rebuild"
            fi
          fi

      - name: Free disk space in chroot
        if: steps.cache-stages.outputs.cache-hit != 'true'
        run: |
          # Inject apt-get clean before dist-upgrade to avoid running out of space
          COPIES_SCRIPT="pi-gen/stage2/00-copies-and-fills/00-run.sh"
          if [ -f "$COPIES_SCRIPT" ]; then
            sed -i '/dist-upgrade/i on_chroot << EOF\napt-get clean\nEOF' "$COPIES_SCRIPT"
          fi

      - name: Set up QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          sudo update-binfmts --enable
          sudo ln -sf /usr/bin/qemu-aarch64-static /usr/bin/qemu-aarch64
          sudo ln -sf /usr/bin/qemu-arm-static /usr/bin/qemu-arm

      - name: Build image with pi-gen
        run: |
          cd pi-gen
          echo "::notice::Starting pi-gen build for ${{ inputs.arch }}..."

          # Build the pi-gen Docker image
          docker build -t pi-gen-builder .

          mkdir -p work deploy

          # Use bind-mounts for work/ and deploy/ so they live on the host.
          # Pi-gen's build-docker.sh uses anonymous Docker volumes which makes
          # the host path empty — unusable for caching.
          docker run --rm --privileged \
            --name pigen_work_${{ inputs.arch }} \
            -v "$(pwd):/pi-gen" \
            -v "$(pwd)/work:/pi-gen/work" \
            -v "$(pwd)/deploy:/pi-gen/deploy" \
            -e "GIT_HASH=$(git rev-parse HEAD)" \
            pi-gen-builder \
            bash -e -o pipefail -c "
              dpkg-reconfigure qemu-user-static 2>/dev/null || true
              mount binfmt_misc -t binfmt_misc /proc/sys/fs/binfmt_misc 2>/dev/null || true
              cd /pi-gen && ./build.sh
            "
        timeout-minutes: 60

      - name: Fix permissions for cache
        run: |
          # Pi-gen runs as root inside Docker — work/ contains root-owned files.
          # actions/cache runs as runner user and needs read access for tar.
          echo "::notice::Fixing ownership of pi-gen/work for cache storage..."
          sudo chown -R "$(id -u):$(id -g)" pi-gen/work/
          echo "::notice::Ownership fixed. Work dir size:"
          du -sh pi-gen/work/ || true

      - name: Extract raw image from deploy
        id: extract
        run: |
          echo "::group::Deploy directory contents"
          ls -laR pi-gen/deploy/ || true
          echo "::endgroup::"

          IMG_FILE=$(find pi-gen/deploy -name "*.img" -type f | head -1)
          if [ -z "$IMG_FILE" ]; then
            # pi-gen sometimes produces a .zip instead of raw .img
            ZIP_FILE=$(find pi-gen/deploy -name "*.zip" -type f | head -1)
            if [ -n "$ZIP_FILE" ]; then
              echo "::notice::Extracting image from ZIP: $ZIP_FILE"
              unzip -o "$ZIP_FILE" -d pi-gen/deploy/
              IMG_FILE=$(find pi-gen/deploy -name "*.img" -type f | head -1)
            fi
          fi

          if [ -z "$IMG_FILE" ]; then
            echo "::error::No image file found in pi-gen/deploy/"
            exit 1
          fi

          echo "img_file=$IMG_FILE" >> "$GITHUB_OUTPUT"
          echo "::notice::Raw image: $IMG_FILE"

      - name: Validate raw image
        run: |
          IMG_FILE="${{ steps.extract.outputs.img_file }}"

          echo "=== Raw image size ==="
          RAW_SIZE=$(stat -c%s "$IMG_FILE")
          RAW_SIZE_MB=$((RAW_SIZE / 1048576))
          echo "Size: ${RAW_SIZE_MB} MiB (${RAW_SIZE} bytes)"

          # Sanity check: image should be at least 500 MB
          if [ "$RAW_SIZE_MB" -lt 500 ]; then
            echo "::error::Image too small (${RAW_SIZE_MB} MiB). Expected >= 500 MiB."
            exit 1
          fi

          echo "=== Partition table ==="
          fdisk -l "$IMG_FILE"

          # Verify we have at least 2 partitions (boot + root)
          PART_COUNT=$(fdisk -l "$IMG_FILE" 2>/dev/null | grep -cF "${IMG_FILE}")
          echo "Partition count: $PART_COUNT"
          if [ "$PART_COUNT" -lt 2 ]; then
            echo "::error::Expected at least 2 partitions, found $PART_COUNT"
            exit 1
          fi

          echo "=== Partition details ==="
          fdisk -l "$IMG_FILE" | grep "^${IMG_FILE}"

      - name: Compress image
        id: compress
        run: |
          IMG_FILE="${{ steps.extract.outputs.img_file }}"
          OUTPUT_NAME="${{ inputs.output_name }}"

          RAW_SIZE_MB=$(( $(stat -c%s "$IMG_FILE") / 1048576 ))

          # Use xz -6 single-threaded: good compression ratio with much faster
          # speed than -9. Single-thread ensures Etcher/PiImager compatibility
          # (single-block stream). -6 saves ~10 min per arch vs -9 with only
          # ~5-8% larger output.
          echo "::notice::Compressing with xz -6 (single-thread, Etcher-compatible)..."
          xz -6 "$IMG_FILE"

          mkdir -p output
          mv "${IMG_FILE}.xz" "output/${OUTPUT_NAME}"

          cd output
          sha256sum "${OUTPUT_NAME}" > "${OUTPUT_NAME}.sha256"

          XZ_SIZE_MB=$(( $(stat -c%s "${OUTPUT_NAME}") / 1048576 ))

          echo "output_name=${OUTPUT_NAME}" >> "$GITHUB_OUTPUT"
          echo "raw_size_mb=${RAW_SIZE_MB}" >> "$GITHUB_OUTPUT"
          echo "xz_size_mb=${XZ_SIZE_MB}" >> "$GITHUB_OUTPUT"

          echo "=== Compression result ==="
          echo "Raw:        ${RAW_SIZE_MB} MiB"
          echo "Compressed: ${XZ_SIZE_MB} MiB"
          echo "Ratio:      $(( (RAW_SIZE_MB - XZ_SIZE_MB) * 100 / RAW_SIZE_MB ))%"
          ls -lh .

      - name: Validate compressed image
        run: |
          OUTPUT_NAME="${{ inputs.output_name }}"

          echo "=== XZ integrity check ==="
          xz -t "output/${OUTPUT_NAME}"
          echo "XZ integrity: OK"

          echo "=== XZ stream info ==="
          xz -l "output/${OUTPUT_NAME}"

          # Verify single-stream (critical for Etcher compatibility)
          STREAM_COUNT=$(xz -l "output/${OUTPUT_NAME}" 2>/dev/null | awk '/stream/ && /block/ {print $1}' | head -1)
          STREAM_COUNT=${STREAM_COUNT:-1}
          echo "Stream count: $STREAM_COUNT"
          if [ "$STREAM_COUNT" != "1" ]; then
            echo "::warning::XZ has $STREAM_COUNT streams (expected 1 for Etcher compatibility)"
          fi

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: raspi-image-${{ inputs.arch }}
          path: |
            output/*.img.xz
            output/*.sha256
          retention-days: 30
          compression-level: 0

      - name: Build summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Raspi Image Build: ${{ inputs.arch }}

          | Property | Value |
          |----------|-------|
          | Architecture | \`${{ inputs.arch }}\` |
          | Output | \`${{ steps.compress.outputs.output_name }}\` |
          | Raw size | ${{ steps.compress.outputs.raw_size_mb }} MiB |
          | Compressed | ${{ steps.compress.outputs.xz_size_mb }} MiB |
          | Docker tag | \`${{ inputs.docker_image_tag }}\` |
          | XZ mode | xz -6 single-thread (Etcher-compatible) |
          EOF

  # ============================================================================
  # TEST IMAGE (QEMU chroot smoke test)
  # ============================================================================
  test:
    name: Test ${{ inputs.arch }}
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: raspi-image-${{ inputs.arch }}
          path: images

      - name: Set up QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support xz-utils
          sudo update-binfmts --enable

      - name: Decompress and mount image
        id: mount
        run: |
          set -euo pipefail
          OUTPUT_NAME="${{ inputs.output_name }}"
          IMG_XZ="images/${OUTPUT_NAME}"

          echo "=== Decompressing image ==="
          xz -d "$IMG_XZ"
          IMG_FILE="${IMG_XZ%.xz}"

          echo "=== Partition table ==="
          fdisk -l "$IMG_FILE"

          echo "=== Mounting image ==="
          LOOP=$(sudo losetup --find --show --partscan "$IMG_FILE")
          echo "Loop device: $LOOP"
          lsblk "$LOOP"

          sudo mkdir -p /mnt/raspi

          # Mount root partition (p2), then boot partition (p1)
          sudo mount "${LOOP}p2" /mnt/raspi
          sudo mount "${LOOP}p1" /mnt/raspi/boot/firmware || \
            sudo mount "${LOOP}p1" /mnt/raspi/boot || true

          echo "loop=$LOOP" >> "$GITHUB_OUTPUT"

          echo "=== Mounted filesystem overview ==="
          df -h /mnt/raspi /mnt/raspi/boot/firmware 2>/dev/null || \
            df -h /mnt/raspi /mnt/raspi/boot 2>/dev/null || true

      - name: Run smoke tests
        run: |
          chmod +x deployment/raspi-image/test-image.sh
          sudo deployment/raspi-image/test-image.sh \
            /mnt/raspi \
            "${{ inputs.test_version }}" \
            "${{ inputs.arch }}"

      - name: Cleanup
        if: always()
        run: |
          sudo umount -R /mnt/raspi 2>/dev/null || true
          sudo losetup -d "${{ steps.mount.outputs.loop }}" 2>/dev/null || true
