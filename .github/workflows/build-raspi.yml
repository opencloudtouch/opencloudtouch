# ==============================================================================
# BUILD RASPBERRY PI SD CARD IMAGES
#
# Independent from app releases. The SD image is a bootstrapper that pulls the
# latest Docker image on first boot — it does not contain app code itself.
#
# Trigger: workflow_dispatch with a raspi version tag (e.g. "1", "2").
#
# Only needs rebuilding when OS config, Docker setup, or boot scripts change
# (anything under deployment/raspi-image/).
#
# Build + test logic lives in raspi-build-and-test.yml (reusable workflow).
# ==============================================================================

name: Build Raspberry Pi Images

on:
  workflow_dispatch:
    inputs:
      raspi_version:
        description: 'Raspi image version (e.g. "1", "2")'
        required: true
        type: string
      architectures:
        description: 'Architectures to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - arm64
          - armhf

permissions: {}

jobs:
  # ============================================================================
  # RESOLVE ARCHITECTURE MATRIX
  # ============================================================================
  resolve:
    name: Resolve Architectures
    runs-on: ubuntu-latest
    outputs:
      archs: ${{ steps.matrix.outputs.archs }}
    steps:
      - name: Compute matrix
        id: matrix
        run: |
          if [ "${{ inputs.architectures }}" = "all" ]; then
            echo 'archs=["arm64", "armhf"]' >> "$GITHUB_OUTPUT"
          else
            echo 'archs=["${{ inputs.architectures }}"]' >> "$GITHUB_OUTPUT"
          fi

  # ============================================================================
  # BUILD + TEST (per-arch, via reusable workflow)
  # ============================================================================
  build-arm64:
    name: Build + Test arm64
    needs: [resolve]
    if: contains(fromJSON(needs.resolve.outputs.archs), 'arm64')
    uses: ./.github/workflows/raspi-build-and-test.yml
    with:
      arch: arm64
      output_name: 'opencloudtouch_Pi4+Pi5_raspios-bookworm-arm64.img.xz'
      docker_image_tag: 'latest'
      test_version: 'latest'

  build-armhf:
    name: Build + Test armhf
    needs: [resolve]
    if: contains(fromJSON(needs.resolve.outputs.archs), 'armhf')
    uses: ./.github/workflows/raspi-build-and-test.yml
    with:
      arch: armhf
      output_name: 'opencloudtouch_Pi2+Pi3_raspios-bookworm-armhf.img.xz'
      docker_image_tag: 'latest'
      test_version: 'latest'

  # ============================================================================
  # CREATE RELEASE
  # ============================================================================
  release:
    name: Create Raspi Release
    runs-on: ubuntu-latest
    needs: [resolve, build-arm64, build-armhf]
    if: |
      always() &&
      (needs.build-arm64.result == 'success' || needs.build-arm64.result == 'skipped') &&
      (needs.build-armhf.result == 'success' || needs.build-armhf.result == 'skipped') &&
      !(needs.build-arm64.result == 'skipped' && needs.build-armhf.result == 'skipped')

    permissions:
      contents: write

    steps:
      - name: Download all image artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: raspi-image-*
          path: images
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          ls -lhR images/

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RASPI_VERSION="${{ inputs.raspi_version }}"
          # Validate version format (digits and dots only)
          if ! echo "$RASPI_VERSION" | grep -qE '^[0-9]+(\.[0-9]+)*$'; then
            echo "::error::Invalid version format: $RASPI_VERSION"
            exit 1
          fi
          TAG="raspi-v${RASPI_VERSION}"

          # Delete existing release + tag if present (idempotent rebuild)
          gh release delete "$TAG" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          gh api "repos/${{ github.repository }}/git/refs/tags/${TAG}" -X DELETE 2>/dev/null || true

          # Build release notes dynamically based on actual artifacts
          NOTES="## 🍓 Raspberry Pi SD Card Images

          Pre-built SD card images for Raspberry Pi. Flash, boot, done.

          The image automatically pulls the latest OpenCloudTouch Docker container on first boot — no manual setup needed.

          ### Supported Devices

          | File | Devices |
          |------|---------|"

          if ls images/*arm64*.img.xz 1>/dev/null 2>&1; then
            ARM64_FILE=$(ls images/*arm64*.img.xz 2>/dev/null | head -1 | xargs basename)
            NOTES="${NOTES}
          | \`${ARM64_FILE}\` | Raspberry Pi 4, Pi 5 |"
          fi

          if ls images/*armhf*.img.xz 1>/dev/null 2>&1; then
            ARMHF_FILE=$(ls images/*armhf*.img.xz 2>/dev/null | head -1 | xargs basename)
            NOTES="${NOTES}
          | \`${ARMHF_FILE}\` | Raspberry Pi 2, Pi 3 |"
          fi

          NOTES="${NOTES}

          ### Quick Start

          1. Download the image for your Pi model
          2. Flash with **Balena Etcher** or **Raspberry Pi Imager** (Use custom → select .img.xz)
          3. Insert SD card, boot, wait ~2 minutes
          4. Open \`http://opencloudtouch.local:7777\` in your browser

          **Default credentials:** \`oct\` / \`opencloudtouch\` (SSH enabled)"

          # Create release
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Raspberry Pi SD Card Images (v${RASPI_VERSION})" \
            --notes "$NOTES" \
            --latest=false \
            images/*.img.xz images/*.sha256

          echo "✅ Release $TAG created"
          gh release view "$TAG" --repo "${{ github.repository }}"
